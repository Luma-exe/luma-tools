# ============================================================================
# luma-tools — Docker Compose
# ============================================================================
# Services:
#   app          — C++ HTTP server serving the tools web UI
#   cloudflared  — Cloudflare Tunnel (outbound-only, no open ports needed)
#
# Usage:
#   Local dev:         docker compose up app
#   Full production:   docker compose up
#
# Setup:
#   1. Copy .env.example to .env and fill in API keys.
#   2. downloads/ and processing/ are bind-mounted so large media files
#      don't bloat the container layer.
#   3. Add TUNNEL_TOKEN to .env — create a tunnel at dash.cloudflare.com and
#      configure the public hostname: tools.lumaplayground.com → http://app:8080
#
# Note: Cloudflare's free plan limits uploads to 100 MB. The tools app accepts
# up to 500 MB — to enable this, go to Cloudflare dashboard → your domain →
# Rules → Config Rules and set "Upload Max Size" to 500 MB (requires Pro plan),
# or add the COOP/COEP headers via a Transform Rule if needed by ffmpeg.wasm.
#
# Persisting stats.db:
#   stats.db is created in the working directory at runtime. To persist it
#   across container recreations, create the file first then uncomment the
#   bind mount below:
#     New-Item -ItemType File stats.db    (PowerShell)
#     touch stats.db                      (Linux/macOS)
# ============================================================================

services:
  app:
    build: .
    image: luma-tools:latest
    restart: unless-stopped
    container_name: luma-tools-app
    env_file: .env
    volumes:
      - downloads:/app/downloads
      - processing:/app/processing
      # Uncomment to persist stats.db (create the file first — see above):
      # - ./stats.db:/app/stats.db

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --protocol http2 run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      - app

volumes:
  downloads:
  processing:
